<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#1A1A1A"/>
<title>Forecast de Votos — Avante 70 · 2026</title>
<style>
:root{
  --amarelo:#F5C000;--laranja:#E87722;--preto:#1A1A1A;
  --green:#1A7A4A;--lgreen:#C8F0DC;
  --amber:#856404;--lambr:#FFF3CD;
  --red:#7B241C;--lred:#FDDCDC;
  --blue:#1B4F8A;--lblue:#D6EAF8;
  --border:#333;--muted:#718096;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  background:#111;color:#fff;min-height:100vh;padding-bottom:80px}

.header{background:var(--preto);padding:14px 16px;
  position:sticky;top:0;z-index:100;border-bottom:2px solid var(--amarelo)}
.header-top{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;border-radius:50%;background:var(--amarelo);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:var(--preto);flex-shrink:0}
.header h1{font-size:15px;font-weight:700;color:var(--amarelo)}
.header p{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}

.content{padding:12px}
.card{background:#1E1E1E;border-radius:12px;padding:14px;
  margin-bottom:12px;border:0.5px solid var(--border)}
.sec-lbl{font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:block}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:#1E1E1E;border-radius:10px;padding:12px;text-align:center;border:0.5px solid var(--border)}
.kpi-v{font-size:26px;font-weight:700}
.kpi-l{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

/* CANDIDATO TABS */
.cand-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.cand-tabs::-webkit-scrollbar{display:none}
.cand-tab{flex-shrink:0;padding:8px 14px;border-radius:20px;
  border:0.5px solid var(--border);background:#1E1E1E;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--muted)}
.cand-tab.active{color:var(--preto);font-weight:700}

/* FORECAST CARD */
.forecast-cand{background:#1E1E1E;border-radius:12px;padding:14px;
  margin-bottom:12px;border:0.5px solid var(--border);
  border-left:4px solid transparent}
.fc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.fc-nome{font-size:14px;font-weight:700}
.fc-cargo{font-size:10px;color:var(--muted);margin-top:2px}
.fc-numero{font-size:11px;font-weight:700;padding:3px 10px;
  border-radius:20px;background:var(--amarelo);color:var(--preto)}
.fc-projecao{text-align:center;padding:16px;background:#111;
  border-radius:10px;margin-bottom:12px}
.fc-votos{font-size:42px;font-weight:900;line-height:1}
.fc-label{font-size:11px;color:var(--muted);margin-top:4px}
.fc-range{font-size:12px;margin-top:6px}
.fc-zonas{display:flex;flex-direction:column;gap:6px}
.zona-row{display:flex;align-items:center;gap:8px}
.zona-nome{font-size:11px;width:88px;flex-shrink:0;color:#fff}
.zona-bar-track{flex:1;height:14px;background:#111;border-radius:4px;overflow:hidden}
.zona-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;
  justify-content:flex-end;padding-right:5px;font-size:9px;
  font-weight:700;color:#fff;transition:width .8s cubic-bezier(.4,2,.6,1)}
.zona-votos{font-size:11px;font-weight:600;width:48px;text-align:right;flex-shrink:0}
.zona-trend{font-size:11px;width:20px;flex-shrink:0;text-align:center}

/* CONFIGURADOR */
.config-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.config-field{display:flex;flex-direction:column;gap:4px}
.config-field label{font-size:11px;color:var(--muted)}
.config-field input,.config-field select{
  background:#111;border:0.5px solid var(--border);border-radius:8px;
  padding:9px 10px;font-size:13px;color:#fff;outline:none;-webkit-appearance:none}
.slider-wrap{margin-bottom:10px}
.slider-wrap label{font-size:11px;color:var(--muted);display:flex;
  justify-content:space-between;margin-bottom:4px}
.slider-wrap input[type=range]{width:100%;accent-color:var(--amarelo)}
.btn-calc{background:var(--amarelo);color:var(--preto);border:none;
  border-radius:10px;padding:12px;font-size:14px;font-weight:700;
  cursor:pointer;width:100%;margin-top:4px}

/* CENÁRIOS */
.cenarios{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.cenario{border-radius:10px;padding:10px;text-align:center}
.cenario-v{font-size:20px;font-weight:700}
.cenario-l{font-size:10px;margin-top:2px;opacity:.8}

/* INSIGHTS */
.insight{display:flex;gap:8px;align-items:flex-start;padding:8px 10px;
  background:#111;border-radius:8px;margin-bottom:6px}
.insight-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.insight-txt{font-size:12px;line-height:1.5;color:rgba(255,255,255,.8)}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;
  background:var(--preto);border-top:0.5px solid var(--border);
  display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 4px 8px;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:10px;font-weight:500;color:var(--muted)}
.nav-btn.active{color:var(--amarelo)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.panel{display:none}.panel.active{display:block}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">70</div>
    <div style="flex:1">
      <h1>📈 Forecast de Votos</h1>
      <p>Avante 70 · Amazonas 2026</p>
    </div>
    <div style="font-size:10px;color:rgba(255,255,255,.4)" id="hora-fc">--:--</div>
  </div>
</div>

<div class="content">

  <!-- FORECAST -->
  <div class="panel active" id="panel-forecast">

    <div class="kpi-grid" id="kpi-fc"></div>

    <div class="cand-tabs" id="cand-tabs-fc"></div>

    <div id="forecasts-wrap"></div>

  </div>

  <!-- CONFIGURADOR -->
  <div class="panel" id="panel-config">
    <div class="card">
      <span class="sec-lbl">Configurar parâmetros do forecast</span>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6">
        Ajuste os parâmetros abaixo para calibrar a projeção com base no contexto eleitoral do Amazonas.
      </p>

      <div class="config-row">
        <div class="config-field">
          <label>Eleitorado total (AM)</label>
          <input type="number" id="cfg-eleitorado" value="2850000"/>
        </div>
        <div class="config-field">
          <label>% Comparecimento esperado</label>
          <input type="number" id="cfg-comparecimento" value="78" min="1" max="100"/>
        </div>
      </div>

      <div class="slider-wrap">
        <label>
          <span>Fator de conversão SIM → voto</span>
          <span id="lbl-conv">85%</span>
        </label>
        <input type="range" min="50" max="100" value="85" id="cfg-conv"
          oninput="document.getElementById('lbl-conv').textContent=this.value+'%'"/>
      </div>

      <div class="slider-wrap">
        <label>
          <span>Fator de conversão TALVEZ → voto</span>
          <span id="lbl-talvez">30%</span>
        </label>
        <input type="range" min="0" max="80" value="30" id="cfg-talvez"
          oninput="document.getElementById('lbl-talvez').textContent=this.value+'%'"/>
      </div>

      <div class="slider-wrap">
        <label>
          <span>Estimativa de votos não mapeados</span>
          <span id="lbl-naomap">40%</span>
        </label>
        <input type="range" min="0" max="80" value="40" id="cfg-naomap"
          oninput="document.getElementById('lbl-naomap').textContent=this.value+'%'"/>
      </div>

      <div class="config-row">
        <div class="config-field">
          <label>Meta mínima de votos — Aryel</label>
          <input type="number" id="meta-aryel" value="60000"/>
        </div>
        <div class="config-field">
          <label>Meta mínima de votos — Daniel</label>
          <input type="number" id="meta-daniel" value="45000"/>
        </div>
      </div>
      <div class="config-row">
        <div class="config-field">
          <label>Meta de votos — David (Gov.)</label>
          <input type="number" id="meta-david" value="700000"/>
        </div>
        <div class="config-field">
          <label>Dias até a eleição</label>
          <input type="number" id="cfg-dias" value="135"/>
        </div>
      </div>

      <button class="btn-calc" onclick="calcularForecast()">
        📊 Recalcular forecast
      </button>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-forecast" onclick="setTab('forecast')">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Forecast
  </button>
  <button class="nav-btn" id="nav-config" onclick="setTab('config')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Parâmetros
  </button>
</nav>

<script>
const CANDIDATOS = [
  {nome:"Aryel Almeida", slug:"aryel",  cargo:"Dep. Federal",  numero:"7070",
   cor:"#E87722", key:"eleitores_aryel",  meta_key:"meta-aryel"},
  {nome:"Daniel Almeida",slug:"daniel", cargo:"Dep. Estadual", numero:"70070",
   cor:"#C49A00", key:"eleitores_daniel", meta_key:"meta-daniel"},
  {nome:"David Almeida", slug:"david",  cargo:"Governador",    numero:"70",
   cor:"#A04000", key:"eleitores_david",  meta_key:"meta-david"},
];

const ZONAS = ["Zona Norte","Zona Sul","Centro","Zona Oeste","Zona Leste","Interior"];
const PESO_ZONA = {"Zona Norte":0.22,"Zona Sul":0.18,"Centro":0.20,"Zona Oeste":0.15,"Zona Leste":0.18,"Interior":0.07};
let candAtivoFC = null;

function cfg(id) { return parseFloat(document.getElementById(id)?.value)||0; }

function calcVotosProjetados(lista) {
  const conv    = cfg("cfg-conv")   / 100;
  const talvez  = cfg("cfg-talvez") / 100;
  const naomap  = cfg("cfg-naomap") / 100;

  const sim     = lista.filter(e=>e.intencao_voto==="SIM").length;
  const talv    = lista.filter(e=>e.intencao_voto==="TALVEZ").length;

  // Votos mapeados
  const votosMapeados = Math.round(sim * conv + talv * talvez);

  // Estima votos não mapeados proporcional ao universo
  const eleitorado   = cfg("cfg-eleitorado");
  const comparecimento = cfg("cfg-comparecimento") / 100;
  const votosUni     = eleitorado * comparecimento;
  const penetracao   = lista.length / Math.max(votosUni, 1);
  const extrapolado  = penetracao > 0
    ? Math.round(votosMapeados / penetracao * (1 + naomap))
    : votosMapeados * 10;

  return {
    mapeados:  votosMapeados,
    projetado: extrapolado,
    minimo:    Math.round(extrapolado * 0.75),
    maximo:    Math.round(extrapolado * 1.35),
    base:      lista.length,
    sim, talv,
  };
}

function calcularForecast() {
  document.getElementById("hora-fc").textContent =
    new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

  const dados = {};
  let totalBase=0, totalSim=0, totalProj=0;

  CANDIDATOS.forEach(c => {
    const lista = JSON.parse(localStorage.getItem(c.key)||"[]");
    dados[c.slug] = { lista, fc: calcVotosProjetados(lista) };
    totalBase += lista.length;
    totalSim  += dados[c.slug].fc.sim;
    totalProj += dados[c.slug].fc.projetado;
  });

  // KPIs
  document.getElementById("kpi-fc").innerHTML = [
    {v:totalBase.toLocaleString("pt-BR"),  l:"Eleitores na base", c:"var(--amarelo)"},
    {v:totalSim.toLocaleString("pt-BR"),   l:"✅ Declararam SIM", c:"#1A7A4A"},
    {v:totalProj.toLocaleString("pt-BR"),  l:"📈 Votos projetados",c:"var(--laranja)"},
    {v:cfg("cfg-dias")+"d",               l:"⏳ Dias até eleição", c:"var(--muted)"},
  ].map(k=>`<div class="kpi">
    <div class="kpi-v" style="color:${k.c}">${k.v}</div>
    <div class="kpi-l">${k.l}</div>
  </div>`).join("");

  // Tabs
  document.getElementById("cand-tabs-fc").innerHTML = [
    {nome:"Todos", slug:null},
    ...CANDIDATOS.map(c=>({nome:c.nome.split(" ")[0]+" "+c.numero, slug:c.slug, cor:c.cor}))
  ].map(t=>`
    <button class="cand-tab ${candAtivoFC===t.slug?"active":""}"
      style="${candAtivoFC===t.slug?`background:${t.cor||"var(--amarelo)"};border-color:${t.cor||"var(--amarelo)"}`:""}"
      onclick="filtrarFC('${t.slug}')">${t.nome}</button>
  `).join("");

  // Forecasts por candidato
  const candsParaMostrar = candAtivoFC
    ? CANDIDATOS.filter(c=>c.slug===candAtivoFC)
    : CANDIDATOS;

  document.getElementById("forecasts-wrap").innerHTML = candsParaMostrar.map(cand => {
    const {lista, fc} = dados[cand.slug];
    const meta   = cfg(cand.meta_key);
    const pctMeta = meta > 0 ? Math.round(fc.projetado/meta*100) : 0;
    const corMeta = pctMeta >= 100 ? "#1A7A4A" : pctMeta >= 70 ? "#856404" : "#7B241C";
    const diasAte = cfg("cfg-dias");
    const ritmoNecessario = meta > 0 && diasAte > 0
      ? Math.round((meta - fc.projetado) / diasAte)
      : 0;

    // Por zona
    const zonaRows = ZONAS.map(zona => {
      const zLista   = lista.filter(e=>e.zona===zona);
      const zSim     = zLista.filter(e=>e.intencao_voto==="SIM").length;
      const zTalv    = zLista.filter(e=>e.intencao_voto==="TALVEZ").length;
      const zVotos   = Math.round(zSim*(cfg("cfg-conv")/100) + zTalv*(cfg("cfg-talvez")/100));
      const zProj    = zLista.length > 0
        ? Math.round(zVotos / (zLista.length/Math.max(lista.length,1)) * (1+cfg("cfg-naomap")/100))
        : Math.round(fc.projetado * PESO_ZONA[zona]);
      const maxZona  = Math.max(...ZONAS.map(z => {
        const l = lista.filter(e=>e.zona===z);
        return l.length > 0 ? l.filter(e=>e.intencao_voto==="SIM").length : 0;
      }), 1);
      const barW = Math.min(Math.round(zSim/maxZona*100), 100);
      const trend = zLista.length === 0 ? "—" : zSim > zTalv ? "↑" : zSim === 0 ? "↓" : "→";
      const corTrend = trend==="↑"?"#1A7A4A":trend==="↓"?"#7B241C":"#856404";
      return `<div class="zona-row">
        <div class="zona-nome">${zona}</div>
        <div class="zona-bar-track">
          <div class="zona-bar-fill" style="width:${barW}%;background:${cand.cor}">
            ${barW>15?zSim+" SIM":""}
          </div>
        </div>
        <div class="zona-votos" style="color:${cand.cor}">${zProj.toLocaleString("pt-BR")}</div>
        <div class="zona-trend" style="color:${corTrend}">${trend}</div>
      </div>`;
    }).join("");

    // Insights automáticos
    const insights = [];
    if (pctMeta >= 100)
      insights.push({i:"🏆",t:`Projeção acima da meta! Continue expandindo a base para garantir margem de segurança.`});
    else if (pctMeta >= 70)
      insights.push({i:"⚠️",t:`Faltam ${(meta-fc.projetado).toLocaleString("pt-BR")} votos para a meta. Foco nos indecisos (TALVEZ).`});
    else
      insights.push({i:"🚨",t:`Projeção abaixo de 70% da meta. Intensifique o cadastro e os contatos nos próximos dias.`});

    if (ritmoNecessario > 0 && pctMeta < 100)
      insights.push({i:"📅",t:`Para atingir a meta em ${diasAte} dias, é preciso adicionar ${ritmoNecessario.toLocaleString("pt-BR")} votos/dia via campo e conversão de indecisos.`});

    const zonaFria = ZONAS.find(z => {
      const l = lista.filter(e=>e.zona===z);
      return l.length > 0 && l.filter(e=>e.intencao_voto==="SIM").length === 0;
    });
    if (zonaFria)
      insights.push({i:"❄️",t:`${zonaFria} não tem nenhum eleitor com intenção SIM ainda. Priorize o campo nessa zona.`});

    if (fc.talv > fc.sim * 0.5)
      insights.push({i:"🎯",t:`Alta proporção de indecisos (${fc.talv} TALVEZ vs ${fc.sim} SIM). Disparar mensagem de engajamento pode converter muitos votos.`});

    return `<div class="forecast-cand" style="border-left-color:${cand.cor}">
      <div class="fc-header">
        <div>
          <div class="fc-nome" style="color:${cand.cor}">${cand.nome}</div>
          <div class="fc-cargo">${cand.cargo} · Avante 70</div>
        </div>
        <div class="fc-numero">${cand.numero}</div>
      </div>

      <div class="fc-projecao">
        <div class="fc-votos" style="color:${cand.cor}">${fc.projetado.toLocaleString("pt-BR")}</div>
        <div class="fc-label">votos projetados</div>
        <div class="fc-range" style="color:var(--muted)">
          mín ${fc.minimo.toLocaleString("pt-BR")} — máx ${fc.maximo.toLocaleString("pt-BR")}
        </div>
      </div>

      <div class="cenarios">
        <div class="cenario" style="background:#1A1A1A">
          <div class="cenario-v" style="color:#7B241C">${fc.minimo.toLocaleString("pt-BR")}</div>
          <div class="cenario-l" style="color:#7B241C">Pessimista</div>
        </div>
        <div class="cenario" style="background:#1A1A1A">
          <div class="cenario-v" style="color:${cand.cor}">${fc.projetado.toLocaleString("pt-BR")}</div>
          <div class="cenario-l" style="color:${cand.cor}">Base</div>
        </div>
        <div class="cenario" style="background:#1A1A1A">
          <div class="cenario-v" style="color:#1A7A4A">${fc.maximo.toLocaleString("pt-BR")}</div>
          <div class="cenario-l" style="color:#1A7A4A">Otimista</div>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;
        background:#111;border-radius:8px;padding:8px 12px;margin-bottom:12px">
        <div style="font-size:12px;color:var(--muted)">Meta: ${meta>0?meta.toLocaleString("pt-BR"):"—"}</div>
        <div style="font-size:13px;font-weight:700;color:${corMeta}">${pctMeta}% da meta</div>
      </div>

      <span class="sec-lbl">Projeção por zona</span>
      <div class="fc-zonas" style="margin-bottom:14px">${zonaRows}</div>

      <span class="sec-lbl">Insights automáticos</span>
      ${insights.map(ins=>`<div class="insight">
        <span class="insight-icon">${ins.i}</span>
        <span class="insight-txt">${ins.t}</span>
      </div>`).join("")}
    </div>`;
  }).join("");
}

function filtrarFC(slug) {
  candAtivoFC = slug === "null" ? null : slug;
  calcularForecast();
}

function setTab(id) {
  ["forecast","config"].forEach(t=>{
    document.getElementById("panel-"+t).classList.toggle("active",t===id);
    document.getElementById("nav-"+t).classList.toggle("active",t===id);
  });
}

// Init
calcularForecast();
setInterval(calcularForecast, 60000);
</script>
</body>
</html>
