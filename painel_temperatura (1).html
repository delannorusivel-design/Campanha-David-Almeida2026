<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#1A1A1A"/>
<title>Painel de Temperatura — Avante 70 · 2026</title>
<style>
:root{
  --amarelo:#F5C000;--laranja:#E87722;--preto:#1A1A1A;
  --green:#1A7A4A;--lgreen:#C8F0DC;
  --amber:#856404;--lambr:#FFF3CD;
  --red:#7B241C;--lred:#FDDCDC;
  --border:#E2E8F0;--text:#1C1C1C;--muted:#718096;--lgray:#F7F8FA;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  background:#111;color:var(--text);min-height:100vh;padding-bottom:80px}

.header{background:var(--preto);padding:14px 16px;
  position:sticky;top:0;z-index:100;
  border-bottom:2px solid var(--amarelo)}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.logo{width:36px;height:36px;border-radius:50%;background:var(--amarelo);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:var(--preto);flex-shrink:0}
.header h1{font-size:15px;font-weight:700;color:var(--amarelo)}
.header p{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.atualizado{font-size:10px;color:rgba(255,255,255,.4);
  text-align:right;flex:1}

.content{padding:12px}

/* KPI GERAL */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.kpi{background:#1E1E1E;border-radius:10px;padding:11px;text-align:center;
  border:0.5px solid #333}
.kpi-v{font-size:24px;font-weight:700;line-height:1.2}
.kpi-l{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

/* TABS CANDIDATOS */
.cand-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.cand-tabs::-webkit-scrollbar{display:none}
.cand-tab{flex-shrink:0;padding:8px 16px;border-radius:20px;
  border:0.5px solid #333;background:#1E1E1E;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--muted);transition:all .15s}
.cand-tab.active{color:var(--preto);font-weight:700}

/* ZONA CARDS */
.sec-lbl{font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:block}
.zonas-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.zona-card{background:#1E1E1E;border-radius:12px;padding:12px;
  border:0.5px solid #333;border-top:3px solid transparent;transition:all .2s}
.zona-card.hot{border-top-color:#1A7A4A}
.zona-card.warm{border-top-color:#856404}
.zona-card.cold{border-top-color:#7B241C}
.zona-nome{font-size:12px;font-weight:600;color:#fff;margin-bottom:6px}
.zona-pct{font-size:28px;font-weight:700;line-height:1}
.zona-pct.hot{color:#1A7A4A}
.zona-pct.warm{color:var(--amarelo)}
.zona-pct.cold{color:var(--laranja)}
.zona-label{font-size:10px;color:var(--muted);margin-top:2px;margin-bottom:8px}
.zona-bar{height:4px;background:#333;border-radius:2px;overflow:hidden;margin-bottom:8px}
.zona-bar-fill{height:100%;border-radius:2px;transition:width .8s}
.zona-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.zona-stat{text-align:center;background:#111;border-radius:5px;padding:4px 2px}
.zona-stat-v{font-size:13px;font-weight:600}
.zona-stat-l{font-size:8px;color:var(--muted)}

/* TERMÔMETRO VISUAL */
.termometro-wrap{background:#1E1E1E;border-radius:12px;padding:14px;
  margin-bottom:14px;border:0.5px solid #333}
.termo-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.termo-nome{font-size:11px;color:#fff;width:90px;flex-shrink:0}
.termo-bar-track{flex:1;height:18px;background:#111;border-radius:4px;
  overflow:hidden;display:flex}
.termo-seg{height:100%;transition:width .8s;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:600;color:#fff;min-width:0}
.termo-pct{font-size:11px;font-weight:700;width:36px;text-align:right;flex-shrink:0}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;
  background:var(--preto);border-top:0.5px solid #333;
  display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 4px 8px;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:10px;font-weight:500;color:var(--muted)}
.nav-btn.active{color:var(--amarelo)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.panel{display:none}.panel.active{display:block}

/* SIMULADOR */
.sim-card{background:#1E1E1E;border-radius:12px;padding:14px;
  margin-bottom:10px;border:0.5px solid #333}
.sim-campo{margin-bottom:10px}
.sim-campo label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px}
.sim-campo select,.sim-campo input{width:100%;
  background:#111;border:0.5px solid #333;border-radius:8px;
  padding:10px 12px;font-size:14px;color:#fff;outline:none;
  -webkit-appearance:none}
.btn-sim{background:var(--amarelo);color:var(--preto);border:none;
  border-radius:10px;padding:13px;font-size:14px;font-weight:700;
  cursor:pointer;width:100%;margin-top:4px}
.resultado-box{background:#111;border-radius:8px;padding:12px;
  margin-top:10px;font-size:13px;display:none}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">70</div>
    <div>
      <h1>🌡️ Painel de Temperatura</h1>
      <p>Avante 70 · Amazonas 2026</p>
    </div>
    <div class="atualizado" id="hora-atualizado">--:--</div>
  </div>
</div>

<div class="content">

  <!-- DASHBOARD -->
  <div class="panel active" id="panel-dash">

    <!-- KPIs globais -->
    <div class="kpi-row" id="kpi-row"></div>

    <!-- Tabs candidatos -->
    <div class="cand-tabs" id="cand-tabs"></div>

    <!-- Termômetro geral -->
    <span class="sec-lbl">Temperatura por candidato</span>
    <div class="termometro-wrap" id="termo-wrap"></div>

    <!-- Zonas -->
    <span class="sec-lbl" id="zonas-titulo">Zonas — todos os candidatos</span>
    <div class="zonas-grid" id="zonas-grid"></div>

  </div>

  <!-- SIMULADOR -->
  <div class="panel" id="panel-sim">
    <div class="sim-card">
      <span class="sec-lbl">Simular cadastro de eleitor</span>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6">
        Registre um eleitor de teste para ver como a temperatura da zona muda em tempo real.
      </p>
      <div class="sim-campo">
        <label>Candidato</label>
        <select id="sim-cand">
          <option value="aryel">Aryel Almeida — 7070</option>
          <option value="daniel">Daniel Almeida — 70070</option>
          <option value="david">David Almeida — 70</option>
        </select>
      </div>
      <div class="sim-campo">
        <label>Zona</label>
        <select id="sim-zona">
          <option>Zona Norte</option><option>Zona Sul</option>
          <option>Centro</option><option>Zona Oeste</option>
          <option>Zona Leste</option><option>Interior</option>
        </select>
      </div>
      <div class="sim-campo">
        <label>Intenção de voto</label>
        <select id="sim-intencao">
          <option value="SIM">✅ SIM — vai votar</option>
          <option value="TALVEZ">🤔 TALVEZ — indeciso</option>
          <option value="NAO">❌ NÃO — contrário</option>
          <option value="NAO_SABE">❓ Não sabe ainda</option>
        </select>
      </div>
      <button class="btn-sim" onclick="simularCadastro()">
        ➕ Simular cadastro e ver impacto
      </button>
      <div class="resultado-box" id="resultado-box"></div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-dash" onclick="setTab('dash')">
    <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-5"/></svg>
    Dashboard
  </button>
  <button class="nav-btn" id="nav-sim" onclick="setTab('sim')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    Simular
  </button>
</nav>

<script>
// ── DADOS ──────────────────────────────────────────────
// Em produção, esses dados vêm do Google Sheets via webhook
// Aqui simulamos com localStorage dos apps de cadastro

const CANDIDATOS = [
  {nome:"Aryel Almeida", slug:"aryel", cargo:"Dep. Federal", numero:"7070",
   cor:"#E87722", key:"eleitores_aryel"},
  {nome:"Daniel Almeida", slug:"daniel", cargo:"Dep. Estadual", numero:"70070",
   cor:"#C49A00", key:"eleitores_daniel"},
  {nome:"David Almeida",  slug:"david",  cargo:"Governador",   numero:"70",
   cor:"#A04000", key:"eleitores_david"},
];

const ZONAS = ["Zona Norte","Zona Sul","Centro","Zona Oeste","Zona Leste","Interior"];
let candAtivo = null; // null = todos

function carregarDados() {
  const resultado = {};
  CANDIDATOS.forEach(c => {
    const lista = JSON.parse(localStorage.getItem(c.key)||"[]");
    resultado[c.slug] = lista;
  });
  return resultado;
}

function calcTemperatura(lista, zona) {
  const filtrado = zona ? lista.filter(e=>e.zona===zona) : lista;
  const total    = filtrado.length;
  const sim      = filtrado.filter(e=>e.intencao_voto==="SIM").length;
  const talvez   = filtrado.filter(e=>e.intencao_voto==="TALVEZ").length;
  const nao      = filtrado.filter(e=>e.intencao_voto==="NAO").length;
  const naoSabe  = filtrado.filter(e=>e.intencao_voto==="NAO_SABE"||!e.intencao_voto).length;
  const pct      = total > 0 ? Math.round(sim/total*100) : 0;
  return {total, sim, talvez, nao, naoSabe, pct};
}

function classeTermo(pct) {
  return pct >= 60 ? "hot" : pct >= 35 ? "warm" : "cold";
}

function labelTermo(pct) {
  return pct >= 60 ? "🔥 Quente" : pct >= 35 ? "⚠️ Morno" : "❄️ Frio";
}

// ── RENDER ─────────────────────────────────────────────
function render() {
  const dados = carregarDados();
  const hora  = new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("hora-atualizado").textContent = "Atualizado " + hora;

  // KPIs globais
  let totalGeral=0, simGeral=0, talvezGeral=0, naoGeral=0;
  CANDIDATOS.forEach(c => {
    const lista = dados[c.slug];
    totalGeral  += lista.length;
    simGeral    += lista.filter(e=>e.intencao_voto==="SIM").length;
    talvezGeral += lista.filter(e=>e.intencao_voto==="TALVEZ").length;
    naoGeral    += lista.filter(e=>e.intencao_voto==="NAO").length;
  });

  document.getElementById("kpi-row").innerHTML = [
    {v:totalGeral,  l:"Base total",     c:"var(--amarelo)"},
    {v:simGeral,    l:"✅ Vão votar",   c:"#1A7A4A"},
    {v:talvezGeral, l:"🤔 Indecisos",   c:"#856404"},
    {v:naoGeral,    l:"❌ Contrários",  c:"#7B241C"},
  ].map(k=>`<div class="kpi">
    <div class="kpi-v" style="color:${k.c}">${k.v}</div>
    <div class="kpi-l">${k.l}</div>
  </div>`).join("");

  // Tabs candidatos
  const tabs = [
    {nome:"Todos", slug:null, cor:var_amarelo()},
    ...CANDIDATOS.map(c=>({nome:c.nome.split(" ")[0]+" "+c.numero, slug:c.slug, cor:c.cor}))
  ];
  document.getElementById("cand-tabs").innerHTML = tabs.map(t=>`
    <button class="cand-tab ${candAtivo===t.slug?"active":""}"
      style="${candAtivo===t.slug?`background:${t.cor};border-color:${t.cor}`:""}"
      onclick="filtrarCand('${t.slug}')">${t.nome}</button>
  `).join("");

  // Termômetro por candidato
  document.getElementById("termo-wrap").innerHTML = CANDIDATOS.map(c=>{
    const lista = dados[c.slug];
    const t     = calcTemperatura(lista);
    const pctS  = t.total>0?Math.round(t.sim/t.total*100):0;
    const pctT  = t.total>0?Math.round(t.talvez/t.total*100):0;
    const pctN  = t.total>0?Math.round(t.nao/t.total*100):0;
    const pctNS = t.total>0?Math.round(t.naoSabe/t.total*100):0;
    return `<div class="termo-row">
      <div class="termo-nome" style="color:${c.cor}">
        ${c.nome.split(" ")[0]}<br/>
        <span style="font-size:9px;color:var(--muted)">${c.numero}</span>
      </div>
      <div class="termo-bar-track">
        <div class="termo-seg" style="width:${pctS}%;background:#1A7A4A" title="SIM">
          ${pctS>8?pctS+"%":""}
        </div>
        <div class="termo-seg" style="width:${pctT}%;background:#856404" title="TALVEZ">
          ${pctT>8?pctT+"%":""}
        </div>
        <div class="termo-seg" style="width:${pctN}%;background:#7B241C" title="NÃO">
          ${pctN>8?pctN+"%":""}
        </div>
        <div class="termo-seg" style="width:${pctNS}%;background:#333" title="Não sabe">
          ${pctNS>8?pctNS+"%":""}
        </div>
      </div>
      <div class="termo-pct" style="color:${c.cor}">${pctS}%</div>
    </div>`;
  }).join(`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:9px;color:var(--muted);padding-left:98px">
      <span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#1A7A4A;display:inline-block"></span>SIM</span>
      <span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#856404;display:inline-block"></span>TALVEZ</span>
      <span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#7B241C;display:inline-block"></span>NÃO</span>
      <span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#333;display:inline-block"></span>N/S</span>
    </div>`
  );

  // Zonas
  const listaAtiva = candAtivo
    ? dados[candAtivo]
    : Object.values(dados).flat();

  document.getElementById("zonas-titulo").textContent =
    candAtivo
      ? `Zonas — ${CANDIDATOS.find(c=>c.slug===candAtivo)?.nome||""}`
      : "Zonas — todos os candidatos";

  document.getElementById("zonas-grid").innerHTML = ZONAS.map(zona => {
    const t   = calcTemperatura(listaAtiva, zona);
    const cls = classeTermo(t.pct);
    const corBarra = cls==="hot"?"#1A7A4A":cls==="warm"?"#856404":"#7B241C";
    return `<div class="zona-card ${cls}">
      <div class="zona-nome">${zona}</div>
      <div class="zona-pct ${cls}">${t.pct}%</div>
      <div class="zona-label">${labelTermo(t.pct)} · ${t.total} eleitor${t.total!==1?"es":""}</div>
      <div class="zona-bar">
        <div class="zona-bar-fill" style="width:${t.pct}%;background:${corBarra}"></div>
      </div>
      <div class="zona-stats">
        <div class="zona-stat">
          <div class="zona-stat-v" style="color:#1A7A4A">${t.sim}</div>
          <div class="zona-stat-l">SIM</div>
        </div>
        <div class="zona-stat">
          <div class="zona-stat-v" style="color:#856404">${t.talvez}</div>
          <div class="zona-stat-l">TAL</div>
        </div>
        <div class="zona-stat">
          <div class="zona-stat-v" style="color:#7B241C">${t.nao}</div>
          <div class="zona-stat-l">NÃO</div>
        </div>
        <div class="zona-stat">
          <div class="zona-stat-v" style="color:var(--muted)">${t.naoSabe}</div>
          <div class="zona-stat-l">N/S</div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function var_amarelo() { return "#F5C000"; }

function filtrarCand(slug) {
  candAtivo = slug === "null" ? null : slug;
  render();
}

// ── SIMULADOR ──────────────────────────────────────────
function simularCadastro() {
  const cSlug    = document.getElementById("sim-cand").value;
  const zona     = document.getElementById("sim-zona").value;
  const intencao = document.getElementById("sim-intencao").value;
  const cand     = CANDIDATOS.find(c=>c.slug===cSlug);

  const antes = calcTemperatura(
    JSON.parse(localStorage.getItem(cand.key)||"[]"), zona
  );

  const novoEl = {
    id:            Date.now(),
    dia:           new Date().toISOString().slice(0,10),
    hora:          new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
    candidato:     cand.nome,
    nome:          "Eleitor Simulado",
    whats:         "(92) 99999-" + String(Math.floor(Math.random()*9000)+1000),
    zona:          zona,
    intencao_voto: intencao,
    status:        "Novo",
  };

  const lista = JSON.parse(localStorage.getItem(cand.key)||"[]");
  lista.push(novoEl);
  localStorage.setItem(cand.key, JSON.stringify(lista));

  const depois = calcTemperatura(lista, zona);
  const rb     = document.getElementById("resultado-box");
  rb.style.display = "block";

  const delta  = depois.pct - antes.pct;
  const sinal  = delta >= 0 ? "+" : "";
  const corDelta = delta > 0 ? "#1A7A4A" : delta < 0 ? "#7B241C" : "#718096";

  rb.innerHTML = `
    <div style="color:var(--amarelo);font-weight:600;margin-bottom:6px">
      Impacto na ${zona} — ${cand.nome}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
      <span style="color:var(--muted)">Antes</span>
      <span style="color:#fff;font-weight:600">${antes.pct}% favorável</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px">
      <span style="color:var(--muted)">Depois</span>
      <span style="color:#fff;font-weight:600">${depois.pct}% favorável</span>
    </div>
    <div style="text-align:center;font-size:18px;font-weight:700;color:${corDelta}">
      ${sinal}${delta}% ${delta>0?"↑":delta<0?"↓":"—"}
    </div>
    <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:4px">
      ${depois.total} eleitor${depois.total!==1?"es":""} na ${zona}
    </div>`;

  render();
}

// ── TABS ───────────────────────────────────────────────
function setTab(id) {
  ["dash","sim"].forEach(t=>{
    document.getElementById("panel-"+t).classList.toggle("active",t===id);
    document.getElementById("nav-"+t).classList.toggle("active",t===id);
  });
}

// ── INIT ───────────────────────────────────────────────
render();
setInterval(render, 30000);
</script>
</body>
</html>
