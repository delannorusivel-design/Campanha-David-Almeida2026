<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0D1F3C">
<title>Painel de Campo — Campanha David Almeida 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --azul: #0D1F3C;
  --verde: #00A859;
  --verde2: #00C96A;
  --amarelo: #FFD600;
  --branco: #FFFFFF;
  --cinza1: #F4F6FA;
  --cinza2: #E2E8F0;
  --cinza3: #94A3B8;
  --card: #FFFFFF;
  --shadow: 0 2px 20px rgba(13,31,60,0.09);
  --shadow-hover: 0 8px 32px rgba(13,31,60,0.16);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--cinza1);
  color: var(--azul);
  min-height: 100vh;
}

/* HEADER */
.header {
  background: var(--azul);
  padding: 0 24px;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top:0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.2);
}
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px; letter-spacing: 1.5px;
  color: var(--amarelo);
}
.header-sub { font-size: 12px; color: rgba(255,255,255,0.55); }
.header-right { display: flex; align-items: center; gap: 16px; }
.btn-refresh {
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  color: white; border-radius: 10px; padding: 8px 16px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.btn-refresh:hover { background: rgba(255,255,255,0.2); }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--verde2);
  box-shadow: 0 0 6px var(--verde2);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
.ultima-atualizacao { font-size: 11px; color: rgba(255,255,255,0.45); }

/* STATS BANNER */
.stats-banner {
  background: linear-gradient(135deg, #0D1F3C 0%, #1a3a6e 100%);
  padding: 20px 24px;
  display: flex; gap: 0;
  overflow-x: auto;
}
.stat-card {
  flex-shrink: 0; min-width: 120px;
  padding: 0 24px; text-align: center;
  border-right: 1px solid rgba(255,255,255,0.12);
}
.stat-card:last-child { border-right: none; }
.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 40px; line-height: 1;
  color: var(--amarelo);
}
.stat-label { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.8px; }

/* FILTROS */
.filtros-bar {
  background: white; padding: 12px 24px;
  border-bottom: 1px solid var(--cinza2);
  display: flex; gap: 8px; overflow-x: auto;
  align-items: center;
}
.filtros-bar::-webkit-scrollbar { display: none; }
.filtro-btn {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  border: 2px solid var(--cinza2); background: white;
  font-size: 12px; font-weight: 600; cursor: pointer;
  color: var(--cinza3); font-family: 'Inter', sans-serif;
  transition: all .15s; white-space: nowrap;
}
.filtro-btn.ativo { border-color: var(--verde); background: #F0FDF4; color: var(--verde); }
.filtros-label { font-size: 12px; color: var(--cinza3); font-weight: 600; margin-right: 4px; flex-shrink: 0; }

/* MAIN LAYOUT */
.main { padding: 24px; max-width: 1200px; margin: 0 auto; }
.main-title {
  font-size: 13px; font-weight: 700; color: var(--cinza3);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.count-badge {
  background: var(--cinza2); color: var(--azul);
  border-radius: 20px; padding: 2px 10px;
  font-size: 12px; font-weight: 700;
}

/* FEED GRID */
.feed-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}
@media (max-width: 600px) {
  .feed-grid { grid-template-columns: 1fr; gap: 14px; }
  .main { padding: 14px; }
  .stats-banner { padding: 14px; }
  .stat-card { min-width: 90px; padding: 0 16px; }
  .stat-num { font-size: 32px; }
}

/* FEED CARD */
.feed-card {
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow .2s, transform .2s;
}
.feed-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }

.feed-header {
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--cinza2);
}
.feed-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 16px; color: white;
  flex-shrink: 0;
}
.feed-user { flex: 1; min-width: 0; }
.feed-nome { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.feed-meta { font-size: 12px; color: var(--cinza3); margin-top: 2px; }
.feed-hora {
  font-size: 11px; color: var(--cinza3);
  flex-shrink: 0; text-align: right;
}
.feed-tipo-badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 10px;
  background: var(--cinza1); color: var(--azul);
  margin-top: 2px;
}

/* FOTO */
.feed-foto-wrap {
  position: relative;
  background: #111;
  overflow: hidden;
  cursor: zoom-in;
}
.feed-foto {
  width: 100%; display: block;
  max-height: 340px; object-fit: cover;
  transition: transform .3s ease;
}
.feed-foto-wrap:hover .feed-foto { transform: scale(1.03); }
.feed-foto-erro {
  padding: 24px; text-align: center;
  color: var(--cinza3); font-size: 13px;
  background: var(--cinza1);
}
.feed-foto-pendente {
  padding: 20px; text-align: center;
  color: #F59E0B; font-size: 13px;
  background: #FFFBEB;
  border-top: 1px solid #FDE68A;
}

/* BODY */
.feed-body { padding: 12px 16px 16px; }
.feed-eleit {
  font-size: 22px; font-weight: 800;
  font-family: 'Bebas Neue', sans-serif;
  color: var(--verde); display: flex; align-items: center; gap: 6px;
}
.feed-eleit span { font-size: 13px; font-weight: 500; color: var(--cinza3); font-family: 'Inter', sans-serif; }
.feed-obs { font-size: 13px; color: #475569; margin-top: 8px; line-height: 1.5; }
.feed-gps { font-size: 11px; color: var(--cinza3); margin-top: 8px; display: flex; align-items: center; gap: 4px; }
.feed-gps a { color: var(--verde); text-decoration: none; }

/* ZONA TAG */
.zona-tag {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 10px; margin-left: auto;
}

/* LIGHTBOX */
.lightbox {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92); z-index: 500;
  display: none; align-items: center; justify-content: center;
  flex-direction: column;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 95vw; max-height: 85vh;
  border-radius: 12px;
  object-fit: contain;
}
.lightbox-close {
  position: absolute; top: 16px; right: 20px;
  color: white; font-size: 32px; cursor: pointer;
  background: rgba(255,255,255,0.15); border: none;
  border-radius: 50%; width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
}
.lightbox-caption {
  color: rgba(255,255,255,0.7); font-size: 13px;
  margin-top: 12px; text-align: center;
}

/* EMPTY STATE */
.empty-state {
  grid-column: 1/-1; text-align: center;
  padding: 48px 24px; color: var(--cinza3);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-msg { font-size: 15px; }

/* LOADING */
.loading {
  grid-column: 1/-1; text-align: center;
  padding: 48px; color: var(--cinza3);
}
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid var(--cinza2);
  border-top-color: var(--verde);
  animation: spin .8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* RANKING SIDEBAR */
.layout { display: flex; gap: 24px; align-items: flex-start; }
.feed-area { flex: 1; min-width: 0; }
.sidebar { width: 280px; flex-shrink: 0; }
@media (max-width: 900px) { .layout { flex-direction: column; } .sidebar { width: 100%; } }

.ranking-card {
  background: var(--card); border-radius: 18px;
  box-shadow: var(--shadow); overflow: hidden;
  margin-bottom: 20px;
}
.ranking-title {
  background: var(--azul); color: white;
  padding: 14px 16px;
  font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  display: flex; align-items: center; gap: 8px;
}
.ranking-item {
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--cinza2);
}
.ranking-item:last-child { border-bottom: none; }
.rank-pos {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; color: var(--cinza3);
  width: 24px; text-align: center; flex-shrink: 0;
}
.rank-pos.gold { color: #F59E0B; }
.rank-pos.silver { color: #94A3B8; }
.rank-pos.bronze { color: #CD7C52; }
.rank-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: white; flex-shrink: 0;
}
.rank-info { flex: 1; min-width: 0; }
.rank-nome { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-sub { font-size: 11px; color: var(--cinza3); }
.rank-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; color: var(--verde);
}

/* Cores por zona */
.zona-Norte  { background: #3B82F6; }
.zona-Sul    { background: #EF4444; }
.zona-Centro { background: #8B5CF6; }
.zona-Oeste  { background: #F59E0B; }
.zona-Leste  { background: #10B981; }
.zona-Rural  { background: #84CC16; }
.zona-       { background: #94A3B8; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-brand">
    <div>
      <div class="header-logo">📍 AVANTE 70 — CAMPO</div>
      <div class="header-sub">Campanha David Almeida 2026 · Painel em tempo real</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <div class="ultima-atualizacao" id="ultima-atualiz">Carregando...</div>
    <button class="btn-refresh" onclick="carregar()">🔄 Atualizar</button>
  </div>
</div>

<!-- STATS -->
<div class="stats-banner">
  <div class="stat-card">
    <div class="stat-num" id="s-total">0</div>
    <div class="stat-label">Check-ins hoje</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="s-ativistas">0</div>
    <div class="stat-label">Ativistas em campo</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="s-eleit">0</div>
    <div class="stat-label">Eleitores abordados</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="s-fotos">0</div>
    <div class="stat-label">Fotos registradas</div>
  </div>
</div>

<!-- FILTROS -->
<div class="filtros-bar">
  <span class="filtros-label">Filtrar:</span>
  <button class="filtro-btn ativo" data-filtro="" onclick="filtrar(this)">Todos</button>
  <button class="filtro-btn" data-filtro="Zona Norte" onclick="filtrar(this)">🔵 Norte</button>
  <button class="filtro-btn" data-filtro="Zona Sul" onclick="filtrar(this)">🔴 Sul</button>
  <button class="filtro-btn" data-filtro="Centro" onclick="filtrar(this)">🟣 Centro</button>
  <button class="filtro-btn" data-filtro="Zona Oeste" onclick="filtrar(this)">🟡 Oeste</button>
  <button class="filtro-btn" data-filtro="Zona Leste" onclick="filtrar(this)">🟢 Leste</button>
  <button class="filtro-btn" data-filtro="Zona Rural" onclick="filtrar(this)">🌿 Rural</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="layout">
    <div class="feed-area">
      <div class="main-title">
        <span>📸 Feed de campo</span>
        <span class="count-badge" id="feed-count">0 registros</span>
      </div>
      <div class="feed-grid" id="feed-grid">
        <div class="loading">
          <div class="spinner"></div>
          Carregando check-ins...
        </div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="ranking-card">
        <div class="ranking-title">🏆 Ranking de ativistas</div>
        <div id="ranking-lista">
          <div style="padding:16px;color:var(--cinza3);font-size:13px;text-align:center">Carregando...</div>
        </div>
      </div>

      <div class="ranking-card">
        <div class="ranking-title">📊 Por zona</div>
        <div id="zonas-lista">
          <div style="padding:16px;color:var(--cinza3);font-size:13px;text-align:center">Carregando...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="fecharLightbox()">
  <button class="lightbox-close" onclick="fecharLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-caption" id="lightbox-caption"></div>
</div>

<script>
const WEBHOOK = "https://script.google.com/macros/s/AKfycbwo8lkCo7SY3g-Mu0pTkIIgEEBMcdyBn1n41GwWVHSbpCW2ZDSY6a_6DKO6d8p3mRE-/exec";
const TOKEN   = "avante70-am-2026-token-secreto";

// Cores por zona
const ZCORS = {
  "Zona Norte": "#3B82F6",
  "Zona Sul":   "#EF4444",
  "Centro":     "#8B5CF6",
  "Zona Oeste": "#F59E0B",
  "Zona Leste": "#10B981",
  "Zona Rural": "#84CC16",
};

let todosCheckins = [];
let filtroAtivo = "";

// ── BUSCAR DADOS ──
async function carregar() {
  const grid = document.getElementById("feed-grid");
  grid.innerHTML = `<div class="loading"><div class="spinner"></div>Carregando check-ins...</div>`;

  try {
    // Tenta buscar do Apps Script
    const url = `${WEBHOOK}?acao=listar&token=${TOKEN}&t=${Date.now()}`;
    const resp = await fetch(url);
    const json = await resp.json();

    if (json.checkins && Array.isArray(json.checkins)) {
      todosCheckins = json.checkins;
    } else {
      throw new Error("Sem dados");
    }
  } catch(e) {
    // Fallback: dados locais (localStorage do checkin_ativista)
    const local = JSON.parse(localStorage.getItem("checkins_hoje") || "[]");
    todosCheckins = local;

    if (!todosCheckins.length) {
      // Demo data para mostrar o layout
      todosCheckins = gerarDemoData();
    }
  }

  renderTudo();
  atualizarHora();
}

function gerarDemoData() {
  const nomes = ["Maria Silva", "João Pereira", "Ana Costa", "Carlos Lima", "Fernanda Souza"];
  const zonas = ["Zona Norte", "Zona Sul", "Centro", "Zona Oeste", "Zona Leste"];
  const tipos = ["Visita domiciliar", "Abordagem de rua", "Distribuição de material", "Reunião de líderes"];
  return nomes.map((nome, i) => ({
    id: Date.now() + i,
    dia: new Date().toLocaleDateString("pt-BR"),
    hora: `${9+i}:${String(i*10).padStart(2,"0")}`,
    nome, zona: zonas[i], lider: "Coord. Principal",
    tipo: tipos[i % tipos.length],
    eleit: (i+1)*7,
    obs: i === 0 ? "Rua das Flores — ótima receptividade!" : "",
    lat: "", lng: "",
    foto_url: "", // sem foto no demo
  }));
}

function filtrar(btn) {
  document.querySelectorAll(".filtro-btn").forEach(b=>b.classList.remove("ativo"));
  btn.classList.add("ativo");
  filtroAtivo = btn.dataset.filtro;
  renderFeed();
}

function renderTudo() {
  renderFeed();
  renderRanking();
  renderZonas();
  renderStats();
}

function checkinsFiltrados() {
  if (!filtroAtivo) return todosCheckins;
  return todosCheckins.filter(c => c.zona === filtroAtivo);
}

// ── FEED ──
function renderFeed() {
  const lista = checkinsFiltrados();
  const grid  = document.getElementById("feed-grid");
  document.getElementById("feed-count").textContent = `${lista.length} registro${lista.length!==1?"s":""}`;

  if (!lista.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-msg">Nenhum check-in encontrado</div>
    </div>`;
    return;
  }

  grid.innerHTML = [...lista].reverse().map(c => {
    const cor = ZCORS[c.zona] || "#94A3B8";
    const zonaKey = (c.zona || "").replace("Zona ","");
    const ini = (c.nome||"A").split(" ").map(p=>p[0]).slice(0,2).join("").toUpperCase();

    let fotoHtml = "";
    if (c.foto_url) {
      fotoHtml = `<div class="feed-foto-wrap" onclick="abrirLightbox('${c.foto_url}','${esc(c.nome)} · ${esc(c.hora)}')">
        <img src="${c.foto_url}" class="feed-foto" loading="lazy"
          onerror="this.closest('.feed-foto-wrap').outerHTML='<div class=feed-foto-erro>📷 Foto indisponível</div>'">
      </div>`;
    } else {
      fotoHtml = `<div class="feed-foto-pendente">⏳ Aguardando foto...</div>`;
    }

    const mapsUrl = c.lat ? `https://maps.google.com/?q=${c.lat},${c.lng}` : "";

    return `<div class="feed-card">
      <div class="feed-header">
        <div class="feed-avatar zona-${zonaKey}" style="background:${cor}">${ini}</div>
        <div class="feed-user">
          <div class="feed-nome">${esc(c.nome||"Ativista")}</div>
          <div class="feed-meta">
            ${c.zona ? `<span style="color:${cor};font-weight:700">${c.zona}</span>` : ""}
            ${c.lider ? ` · ${esc(c.lider)}` : ""}
          </div>
          <div class="feed-tipo-badge">${c.tipo||""}</div>
        </div>
        <div class="feed-hora">${c.hora||""}<br><span style="font-size:10px;color:var(--cinza3)">${c.dia||""}</span></div>
      </div>
      ${fotoHtml}
      <div class="feed-body">
        <div class="feed-eleit">👥 ${c.eleit||0} <span>eleitores abordados</span></div>
        ${c.obs ? `<div class="feed-obs">📝 ${esc(c.obs)}</div>` : ""}
        ${mapsUrl ? `<div class="feed-gps">📍 <a href="${mapsUrl}" target="_blank">Ver no mapa</a> (±${c.acc}m)</div>` : ""}
      </div>
    </div>`;
  }).join("");
}

// ── STATS ──
function renderStats() {
  const lista = todosCheckins;
  document.getElementById("s-total").textContent = lista.length;
  const ativistas = new Set(lista.map(c=>c.nome)).size;
  document.getElementById("s-ativistas").textContent = ativistas;
  const eleit = lista.reduce((a,c)=>a+Number(c.eleit||0),0);
  document.getElementById("s-eleit").textContent = eleit;
  const fotos = lista.filter(c=>c.foto_url).length;
  document.getElementById("s-fotos").textContent = fotos;
}

// ── RANKING ──
function renderRanking() {
  const contagem = {};
  todosCheckins.forEach(c => {
    if (!contagem[c.nome]) contagem[c.nome] = { checkins:0, eleit:0, zona:c.zona };
    contagem[c.nome].checkins++;
    contagem[c.nome].eleit += Number(c.eleit||0);
  });
  const sorted = Object.entries(contagem).sort((a,b)=>b[1].eleit-a[1].eleit).slice(0,8);
  const posClasses = ["gold","silver","bronze"];
  const el = document.getElementById("ranking-lista");
  if (!sorted.length) { el.innerHTML = `<div style="padding:16px;color:var(--cinza3);font-size:13px;text-align:center">Sem dados</div>`; return; }
  el.innerHTML = sorted.map(([nome,d],i) => {
    const cor = ZCORS[d.zona] || "#94A3B8";
    const zonaKey = (d.zona||"").replace("Zona ","");
    const ini = nome.split(" ").map(p=>p[0]).slice(0,2).join("").toUpperCase();
    return `<div class="ranking-item">
      <div class="rank-pos ${posClasses[i]||""}">${i+1}</div>
      <div class="rank-avatar zona-${zonaKey}" style="background:${cor}">${ini}</div>
      <div class="rank-info">
        <div class="rank-nome">${esc(nome)}</div>
        <div class="rank-sub">${d.checkins} check-in${d.checkins!==1?"s":""}</div>
      </div>
      <div class="rank-num">${d.eleit}</div>
    </div>`;
  }).join("");
}

// ── ZONAS ──
function renderZonas() {
  const contagem = {};
  todosCheckins.forEach(c => {
    const z = c.zona || "Sem zona";
    if (!contagem[z]) contagem[z] = { checkins:0, eleit:0 };
    contagem[z].checkins++;
    contagem[z].eleit += Number(c.eleit||0);
  });
  const sorted = Object.entries(contagem).sort((a,b)=>b[1].eleit-a[1].eleit);
  const maxEleit = Math.max(...sorted.map(([,d])=>d.eleit), 1);
  const el = document.getElementById("zonas-lista");
  if (!sorted.length) { el.innerHTML = `<div style="padding:16px;color:var(--cinza3);font-size:13px;text-align:center">Sem dados</div>`; return; }
  el.innerHTML = sorted.map(([zona,d]) => {
    const cor = ZCORS[zona] || "#94A3B8";
    const pct = Math.round(d.eleit/maxEleit*100);
    return `<div style="padding:12px 16px;border-bottom:1px solid var(--cinza2)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:13px;font-weight:600;color:${cor}">${esc(zona)}</span>
        <span style="font-size:11px;color:var(--cinza3)">${d.checkins} check-ins</span>
      </div>
      <div style="background:var(--cinza2);border-radius:4px;height:6px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${cor};border-radius:4px;transition:width .5s"></div>
      </div>
      <div style="font-size:11px;color:var(--cinza3);margin-top:4px">👥 ${d.eleit} eleitores</div>
    </div>`;
  }).join("");
}

// ── LIGHTBOX ──
function abrirLightbox(url, caption) {
  document.getElementById("lightbox-img").src = url;
  document.getElementById("lightbox-caption").textContent = caption;
  document.getElementById("lightbox").classList.add("open");
}
function fecharLightbox() { document.getElementById("lightbox").classList.remove("open"); }
document.addEventListener("keydown", e => { if(e.key==="Escape") fecharLightbox(); });

// ── HELPERS ──
function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function atualizarHora() {
  const h = new Date().toLocaleTimeString("pt-BR", {hour:"2-digit",minute:"2-digit"});
  document.getElementById("ultima-atualiz").textContent = `Atualizado às ${h}`;
}

// ── INIT ──
carregar();
setInterval(carregar, 60000); // auto-refresh a cada 1 min
</script>
