<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#f97316">
<title>Painel de Campo · David Almeida 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --o1: #f97316;   /* laranja principal */
  --o2: #ea580c;   /* laranja escuro */
  --o3: #fed7aa;   /* laranja claro */
  --o4: #fff7ed;   /* laranja palido */
  --o5: #ffedd5;   /* laranja suave */
  --dark: #1c0a00; /* marrom escuro quase preto */
  --mid:  #78350f; /* marrom medio */
  --soft: #d97706; /* ambar */
  --text: #292524;
  --sub:  #78716c;
  --bg:   #fafaf9;
  --card: #ffffff;
  --border: #e7e5e4;
  --shadow: 0 1px 12px rgba(249,115,22,0.08);
  --shadow-lg: 0 8px 32px rgba(249,115,22,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
}

/* ── TOP NAV ─────────────────────────── */
.topnav {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 1px 0 var(--border);
}
.nav-brand {
  display: flex; align-items: center; gap: 10px;
}
.nav-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--o1), var(--o2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 15px; color: #fff;
  box-shadow: 0 3px 10px rgba(249,115,22,0.4);
}
.nav-title { font-size: 15px; font-weight: 800; color: var(--text); }
.nav-sub { font-size: 11px; color: var(--sub); }
.nav-right { display: flex; align-items: center; gap: 10px; }
.nav-live {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; color: var(--o1);
  background: var(--o5); padding: 4px 10px; border-radius: 999px;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--o1);
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.btn-refresh {
  background: var(--o1); color: #fff; border: none;
  border-radius: 9px; padding: 7px 14px; font-size: 12px;
  font-weight: 700; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 5px;
  transition: background .15s, transform .15s;
}
.btn-refresh:hover { background: var(--o2); transform: translateY(-1px); }
.hora-texto { font-size: 11px; color: var(--sub); }

/* ── PIN OVERLAY ─────────────────────── */
.pin-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(145deg, #1c0a00 0%, #431407 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
}
.pin-box {
  width: 340px; text-align: center; padding: 40px 36px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(249,115,22,0.3);
  border-radius: 24px;
  backdrop-filter: blur(12px);
}
.pin-icon {
  width: 68px; height: 68px; border-radius: 20px; margin: 0 auto 16px;
  background: linear-gradient(135deg, var(--o1), var(--o2));
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; box-shadow: 0 8px 24px rgba(249,115,22,0.5);
}
.pin-title { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px; }
.pin-sub { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 28px; }
.pin-input {
  width: 100%; padding: 14px; text-align: center;
  font-size: 26px; letter-spacing: 0.5em;
  border-radius: 14px; border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08); color: #fff;
  font-family: inherit; outline: none; margin-bottom: 14px;
  transition: border-color .2s;
}
.pin-input:focus { border-color: var(--o1); }
.pin-btn {
  width: 100%; padding: 14px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, var(--o1), var(--o2));
  color: #fff; font-weight: 800; font-size: 15px;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 6px 20px rgba(249,115,22,0.5);
  transition: transform .15s;
}
.pin-btn:hover { transform: translateY(-2px); }
.pin-erro { color: #fca5a5; font-size: 13px; margin-top: 12px; display: none; font-weight: 600; }

/* ── STORIES / ATIVISTAS ─────────────── */
.stories-bar {
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 14px 20px; overflow-x: auto; display: flex; gap: 16px;
}
.stories-bar::-webkit-scrollbar { display: none; }
.story-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; flex-shrink: 0; }
.story-ring {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--o1), var(--o2));
  padding: 2.5px; box-shadow: 0 2px 8px rgba(249,115,22,0.3);
}
.story-ring.visto {
  background: linear-gradient(135deg, #d4d4d4, #a8a29e);
  box-shadow: none;
}
.story-avatar {
  width: 100%; height: 100%; border-radius: 50%;
  background: var(--o5); border: 2px solid #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 16px; color: var(--o2);
}
.story-nome { font-size: 10px; font-weight: 600; color: var(--sub); max-width: 60px; text-align: center; line-height: 1.2; }
.story-checkins { font-size: 10px; font-weight: 800; color: var(--o1); }

/* ── STATS BAR ───────────────────────── */
.stats-bar {
  background: linear-gradient(135deg, var(--o2) 0%, var(--o1) 100%);
  padding: 16px 20px; display: flex; gap: 0; overflow-x: auto;
}
.stats-bar::-webkit-scrollbar { display: none; }
.stat-item {
  flex: 1; min-width: 80px; text-align: center;
  padding: 0 16px; border-right: 1px solid rgba(255,255,255,0.2);
}
.stat-item:last-child { border-right: none; }
.stat-n { font-size: 28px; font-weight: 900; color: #fff; line-height: 1; }
.stat-l { font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── FILTROS ─────────────────────────── */
.filtros {
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 10px 20px; display: flex; gap: 6px; overflow-x: auto;
}
.filtros::-webkit-scrollbar { display: none; }
.ftag {
  flex-shrink: 0; padding: 5px 14px; border-radius: 999px;
  border: 1.5px solid var(--border); background: #fff;
  font-size: 12px; font-weight: 700; cursor: pointer;
  color: var(--sub); font-family: inherit; transition: all .15s;
  white-space: nowrap;
}
.ftag.on { border-color: var(--o1); background: var(--o5); color: var(--o2); }

/* ── LAYOUT ──────────────────────────── */
.layout {
  max-width: 1100px; margin: 0 auto; padding: 20px;
  display: flex; gap: 20px; align-items: flex-start;
}
.feed { flex: 1; min-width: 0; }
.sidebar { width: 300px; flex-shrink: 0; }
@media (max-width: 900px) { .layout { flex-direction: column; } .sidebar { width: 100%; } }
@media (max-width: 600px) { .layout { padding: 12px; } }

/* ── FEED HEADER ─────────────────────── */
.feed-header-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.feed-label { font-size: 12px; font-weight: 800; color: var(--sub); text-transform: uppercase; letter-spacing: 0.8px; }
.feed-count-badge {
  background: var(--o5); color: var(--o2);
  border-radius: 999px; padding: 3px 10px;
  font-size: 11px; font-weight: 800;
}

/* ── POST CARD (estilo Instagram) ────── */
.post-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; margin-bottom: 16px; overflow: hidden;
  box-shadow: var(--shadow);
  transition: box-shadow .2s;
}
.post-card:hover { box-shadow: var(--shadow-lg); }

.post-header {
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
}
.post-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: #fff; flex-shrink: 0;
  border: 2px solid var(--o3);
}
.post-user { flex: 1; min-width: 0; }
.post-nome { font-weight: 700; font-size: 14px; line-height: 1.2; }
.post-meta { font-size: 11px; color: var(--sub); margin-top: 2px; }
.post-hora { font-size: 11px; color: var(--sub); flex-shrink: 0; text-align: right; }

.post-tipo {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 6px; background: var(--o5); color: var(--o2);
  margin-top: 3px;
}

/* FOTO QUADRADA (estilo Instagram) */
.post-foto-wrap {
  position: relative; overflow: hidden;
  background: #1c0a00; cursor: zoom-in;
  aspect-ratio: 1 / 1;
}
.post-foto-wrap.paisagem { aspect-ratio: 4 / 3; }
.post-foto {
  width: 100%; height: 100%; object-fit: cover;
  display: block; transition: transform .4s ease;
}
.post-foto-wrap:hover .post-foto { transform: scale(1.04); }
.post-no-foto {
  aspect-ratio: 1 / 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--o5); color: var(--o1);
  font-size: 32px; gap: 8px;
}
.post-no-foto span { font-size: 12px; font-weight: 600; color: var(--soft); }

/* AÇÕES (curtir estilo IG) */
.post-actions {
  padding: 10px 14px 4px;
  display: flex; align-items: center; gap: 14px;
}
.post-action {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 700; color: var(--sub);
  cursor: default;
}
.post-action.destaque { color: var(--o1); }

/* BODY */
.post-body { padding: 4px 14px 14px; }
.post-eleit { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.post-eleit em { color: var(--o1); font-style: normal; }
.post-obs { font-size: 13px; color: var(--sub); line-height: 1.55; margin-top: 4px; }
.post-gps { font-size: 11px; color: var(--sub); margin-top: 8px; display: flex; align-items: center; gap: 4px; }
.post-gps a { color: var(--o1); text-decoration: none; font-weight: 700; }

/* ── SIDEBAR CARDS ───────────────────── */
.side-card {
  background: #fff; border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden; margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.side-title {
  padding: 12px 16px; font-size: 12px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: #fff;
  background: linear-gradient(135deg, var(--o2), var(--o1));
  display: flex; align-items: center; gap: 7px;
}
.rank-item {
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.rank-item:last-child { border-bottom: none; }
.rank-pos { font-size: 18px; font-weight: 900; color: var(--sub); width: 22px; text-align: center; flex-shrink: 0; }
.rank-pos.g { color: #f59e0b; } .rank-pos.s { color: #94a3b8; } .rank-pos.b { color: #cd7c52; }
.rank-av { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; color: #fff; flex-shrink: 0; }
.rank-info { flex: 1; min-width: 0; }
.rank-nome { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-sub { font-size: 11px; color: var(--sub); }
.rank-n { font-size: 20px; font-weight: 900; color: var(--o1); }

.zona-item { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.zona-item:last-child { border-bottom: none; }
.zona-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.zona-nome { font-size: 12px; font-weight: 700; }
.zona-count { font-size: 11px; color: var(--sub); }
.zona-bar { height: 5px; border-radius: 999px; background: var(--border); overflow: hidden; }
.zona-fill { height: 100%; border-radius: 999px; transition: width .5s ease; }
.zona-eleit { font-size: 11px; color: var(--sub); margin-top: 3px; }

/* ── LIGHTBOX ────────────────────────── */
.lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,0.95);
  z-index: 500; display: none; align-items: center;
  justify-content: center; flex-direction: column;
}
.lightbox.open { display: flex; }
.lb-img { max-width: 95vw; max-height: 85vh; border-radius: 12px; object-fit: contain; }
.lb-close {
  position: absolute; top: 16px; right: 16px; width: 40px; height: 40px;
  border-radius: 50%; background: rgba(255,255,255,0.15); border: none;
  color: #fff; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.lb-caption { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 12px; }

/* ── EMPTY / LOADING ─────────────────── */
.empty { text-align: center; padding: 60px 20px; color: var(--sub); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-msg { font-size: 15px; font-weight: 600; }
.empty-sub { font-size: 13px; margin-top: 4px; }
.loading { text-align: center; padding: 60px; color: var(--sub); }
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid var(--o3); border-top-color: var(--o1);
  animation: spin .7s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- PIN -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <div class="pin-icon">📍</div>
    <div class="pin-title">Campo · Avante 70</div>
    <div class="pin-sub">David Almeida 2026 · Acesso restrito</div>
    <input class="pin-input" type="password" id="pinInput" maxlength="8" placeholder="••••"
      onkeydown="if(event.key==='Enter') verificarPin()" autofocus />
    <button class="pin-btn" onclick="verificarPin()">Entrar</button>
    <div class="pin-erro" id="pinErro">PIN incorreto. Tente novamente.</div>
  </div>
</div>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="nav-brand">
    <div class="nav-logo">70</div>
    <div>
      <div class="nav-title">Campo · David Almeida 2026</div>
      <div class="nav-sub" id="hora-texto">Carregando...</div>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-live"><div class="live-dot"></div> AO VIVO</div>
    <button class="btn-refresh" onclick="carregar()">🔄 Atualizar</button>
  </div>
</nav>

<!-- STORIES -->
<div class="stories-bar" id="storiesBar">
  <div style="display:flex;align-items:center;color:#d4d4d4;font-size:12px;padding:8px 0">Carregando ativistas...</div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-n" id="s-total">—</div><div class="stat-l">Check-ins</div></div>
  <div class="stat-item"><div class="stat-n" id="s-ativistas">—</div><div class="stat-l">Ativistas</div></div>
  <div class="stat-item"><div class="stat-n" id="s-eleit">—</div><div class="stat-l">Eleitores</div></div>
  <div class="stat-item"><div class="stat-n" id="s-fotos">—</div><div class="stat-l">Fotos</div></div>
</div>

<!-- FILTROS -->
<div class="filtros">
  <button class="ftag on" data-z="" onclick="filtrar(this)">Todos</button>
  <button class="ftag" data-z="Zona Norte" onclick="filtrar(this)">🔵 Norte</button>
  <button class="ftag" data-z="Zona Sul" onclick="filtrar(this)">🔴 Sul</button>
  <button class="ftag" data-z="Centro" onclick="filtrar(this)">🟣 Centro</button>
  <button class="ftag" data-z="Zona Oeste" onclick="filtrar(this)">🟡 Oeste</button>
  <button class="ftag" data-z="Zona Leste" onclick="filtrar(this)">🟢 Leste</button>
  <button class="ftag" data-z="Zona Rural" onclick="filtrar(this)">🌿 Rural</button>
</div>

<!-- LAYOUT -->
<div class="layout">
  <div class="feed">
    <div class="feed-header-row">
      <div class="feed-label">📸 Feed de campo</div>
      <div class="feed-count-badge" id="feed-count">—</div>
    </div>
    <div id="feed-area">
      <div class="loading"><div class="spinner"></div>Aguardando autenticação...</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="side-card">
      <div class="side-title">🏆 Ranking</div>
      <div id="ranking-lista"><div style="padding:16px;font-size:13px;color:#a8a29e;text-align:center">—</div></div>
    </div>
    <div class="side-card">
      <div class="side-title">📊 Por zona</div>
      <div id="zonas-lista"><div style="padding:16px;font-size:13px;color:#a8a29e;text-align:center">—</div></div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="fecharLb()">
  <button class="lb-close" onclick="fecharLb()">✕</button>
  <img class="lb-img" id="lb-img" src="" alt="">
  <div class="lb-caption" id="lb-cap"></div>
</div>

<script>
const WEBHOOK = "https://script.google.com/macros/s/AKfycbwo8lkCo7SY3g-Mu0pTkIIgEEBMcdyBn1n41GwWVHSbpCW2ZDSY6a_6DKO6d8p3mRE-/exec";
const TOKEN   = "avante70-am-2026-token-secreto";
const PIN_HASH = "7a3ed03b12b784c2581ae5308e31f2a80248b481d8b0d369ee2193dcc3c1c4c5";

const ZCORS = {
  "Zona Norte":"#3b82f6","Zona Sul":"#ef4444","Centro":"#8b5cf6",
  "Zona Oeste":"#f59e0b","Zona Leste":"#10b981","Zona Rural":"#84cc16",
};

let checkins  = [];
let filtroZ   = "";
let autenticado = false;

// ── PIN ───────────────────────────────────────────────────
async function verificarPin() {
  const pin = document.getElementById("pinInput").value;
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  if (hash === PIN_HASH) {
    autenticado = true;
    document.getElementById("pinOverlay").style.display = "none";
    carregar();
  } else {
    document.getElementById("pinErro").style.display = "block";
    document.getElementById("pinInput").value = "";
  }
}

// ── CARREGAR ──────────────────────────────────────────────
async function carregar() {
  if (!autenticado) return;
  document.getElementById("feed-area").innerHTML = `<div class="loading"><div class="spinner"></div>Buscando check-ins...</div>`;

  try {
    const url  = `${WEBHOOK}?acao=listar_checkins&token=${TOKEN}&t=${Date.now()}`;
    const resp = await fetch(url);
    const json = await resp.json();

    if (json.checkins && Array.isArray(json.checkins) && json.checkins.length > 0) {
      checkins = json.checkins;
    } else {
      // Sem dados reais — mostra estado vazio (sem demo)
      checkins = [];
    }
  } catch(e) {
    console.warn("Erro ao buscar:", e.message);
    checkins = [];
  }

  renderTudo();
  atualizarHora();
}

function filtrar(btn) {
  document.querySelectorAll(".ftag").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  filtroZ = btn.dataset.z;
  renderFeed();
}

function filtrados() {
  return filtroZ ? checkins.filter(c=>c.zona===filtroZ) : checkins;
}

function renderTudo() {
  renderStories();
  renderStats();
  renderFeed();
  renderRanking();
  renderZonas();
}

// ── STORIES ───────────────────────────────────────────────
function renderStories() {
  const bar  = document.getElementById("storiesBar");
  const cont = {};
  checkins.forEach(c => {
    if (!cont[c.nome]) cont[c.nome] = { checkins:0, zona:c.zona };
    cont[c.nome].checkins++;
  });
  const sorted = Object.entries(cont).sort((a,b)=>b[1].checkins-a[1].checkins);
  if (!sorted.length) {
    bar.innerHTML = `<div style="display:flex;align-items:center;color:#a8a29e;font-size:12px;padding:8px 0">Nenhum ativista em campo</div>`;
    return;
  }
  bar.innerHTML = sorted.map(([nome, d]) => {
    const cor = ZCORS[d.zona] || "#f97316";
    const ini = nome.split(" ").map(p=>p[0]).slice(0,2).join("").toUpperCase();
    return `<div class="story-item">
      <div class="story-ring">
        <div class="story-avatar" style="background:${cor};color:#fff">${ini}</div>
      </div>
      <div class="story-nome">${esc(nome.split(" ")[0])}</div>
      <div class="story-checkins">${d.checkins}×</div>
    </div>`;
  }).join("");
}

// ── STATS ─────────────────────────────────────────────────
function renderStats() {
  document.getElementById("s-total").textContent    = checkins.length;
  document.getElementById("s-ativistas").textContent = new Set(checkins.map(c=>c.nome)).size;
  document.getElementById("s-eleit").textContent    = checkins.reduce((a,c)=>a+Number(c.eleit||0),0);
  document.getElementById("s-fotos").textContent    = checkins.filter(c=>c.foto_url&&c.foto_url.startsWith("http")).length;
}

// ── FEED ──────────────────────────────────────────────────
function renderFeed() {
  const lista = filtrados();
  const area  = document.getElementById("feed-area");
  document.getElementById("feed-count").textContent = `${lista.length} registro${lista.length!==1?"s":""}`;

  if (!lista.length) {
    area.innerHTML = `<div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-msg">${filtroZ ? "Nenhum check-in nessa zona" : "Nenhum check-in registrado ainda"}</div>
      <div class="empty-sub">Os check-ins aparecerão aqui em tempo real</div>
    </div>`;
    return;
  }

  area.innerHTML = [...lista].reverse().map(c => {
    const cor = ZCORS[c.zona] || "#f97316";
    const ini = (c.nome||"A").split(" ").map(p=>p[0]).slice(0,2).join("").toUpperCase();
    const temFoto = c.foto_url && c.foto_url.startsWith("http");
    const mapsUrl = c.lat && c.lng ? `https://maps.google.com/?q=${c.lat},${c.lng}` : "";
    const fotoEsc = temFoto ? esc(c.foto_url) : "";

    const fotoHtml = temFoto
      ? `<div class="post-foto-wrap" onclick="abrirLb('${fotoEsc}','${esc(c.nome)} · ${esc(c.hora)}')">
           <img class="post-foto" src="${fotoEsc}" loading="lazy"
             onerror="this.closest('.post-foto-wrap').outerHTML='<div class=post-no-foto><span style=font-size:32px>📷</span><span>Foto indisponível</span></div>'">
         </div>`
      : `<div class="post-no-foto"><span>📷</span><span>Sem foto registrada</span></div>`;

    return `<div class="post-card">
      <div class="post-header">
        <div class="post-avatar" style="background:${cor}">${ini}</div>
        <div class="post-user">
          <div class="post-nome">${esc(c.nome||"Ativista")}</div>
          <div class="post-meta">
            <span style="color:${cor};font-weight:700">${esc(c.zona||"")}</span>
            ${c.lider ? ` · ${esc(c.lider)}` : ""}
          </div>
          <div class="post-tipo">${esc(c.tipo||"")}</div>
        </div>
        <div class="post-hora">${esc(c.hora||"")}<br><span style="font-size:10px">${esc(c.dia||"")}</span></div>
      </div>

      ${fotoHtml}

      <div class="post-actions">
        <div class="post-action destaque">👥 <strong>${c.eleit||0}</strong></div>
        ${temFoto ? `<div class="post-action">📸 foto</div>` : ""}
        ${mapsUrl ? `<div class="post-action">📍 GPS</div>` : ""}
      </div>

      <div class="post-body">
        <div class="post-eleit">
          <em>${c.eleit||0}</em> eleitor${Number(c.eleit)!==1?"es":""} abordado${Number(c.eleit)!==1?"s":""}
        </div>
        ${c.obs ? `<div class="post-obs">${esc(c.obs)}</div>` : ""}
        ${mapsUrl ? `<div class="post-gps">📍 <a href="${mapsUrl}" target="_blank">Ver localização no mapa</a> (±${esc(String(c.acc||""))}m)</div>` : ""}
      </div>
    </div>`;
  }).join("");
}

// ── RANKING ───────────────────────────────────────────────
function renderRanking() {
  const cont = {};
  checkins.forEach(c => {
    if (!cont[c.nome]) cont[c.nome] = {n:0, eleit:0, zona:c.zona};
    cont[c.nome].n++;
    cont[c.nome].eleit += Number(c.eleit||0);
  });
  const sorted = Object.entries(cont).sort((a,b)=>b[1].eleit-a[1].eleit).slice(0,8);
  const el = document.getElementById("ranking-lista");
  if (!sorted.length) { el.innerHTML = `<div style="padding:14px;font-size:13px;color:#a8a29e;text-align:center">Sem dados</div>`; return; }
  const pc = ["g","s","b"];
  el.innerHTML = sorted.map(([nome,d],i) => {
    const cor = ZCORS[d.zona]||"#f97316";
    const ini = nome.split(" ").map(p=>p[0]).slice(0,2).join("").toUpperCase();
    return `<div class="rank-item">
      <div class="rank-pos ${pc[i]||""}">${i+1}</div>
      <div class="rank-av" style="background:${cor}">${ini}</div>
      <div class="rank-info">
        <div class="rank-nome">${esc(nome)}</div>
        <div class="rank-sub">${d.n} check-in${d.n!==1?"s":""}</div>
      </div>
      <div class="rank-n">${d.eleit}</div>
    </div>`;
  }).join("");
}

// ── ZONAS ─────────────────────────────────────────────────
function renderZonas() {
  const cont = {};
  checkins.forEach(c => {
    const z = c.zona||"Sem zona";
    if (!cont[z]) cont[z] = {n:0, eleit:0};
    cont[z].n++;
    cont[z].eleit += Number(c.eleit||0);
  });
  const sorted = Object.entries(cont).sort((a,b)=>b[1].eleit-a[1].eleit);
  const max = Math.max(...sorted.map(([,d])=>d.eleit),1);
  const el  = document.getElementById("zonas-lista");
  if (!sorted.length) { el.innerHTML = `<div style="padding:14px;font-size:13px;color:#a8a29e;text-align:center">Sem dados</div>`; return; }
  el.innerHTML = sorted.map(([zona,d]) => {
    const cor = ZCORS[zona]||"#f97316";
    const pct = Math.round(d.eleit/max*100);
    return `<div class="zona-item">
      <div class="zona-row">
        <div class="zona-nome" style="color:${cor}">${esc(zona)}</div>
        <div class="zona-count">${d.n} check-ins</div>
      </div>
      <div class="zona-bar"><div class="zona-fill" style="width:${pct}%;background:${cor}"></div></div>
      <div class="zona-eleit">👥 ${d.eleit} eleitores</div>
    </div>`;
  }).join("");
}

// ── LIGHTBOX ──────────────────────────────────────────────
function abrirLb(url, cap) {
  document.getElementById("lb-img").src = url;
  document.getElementById("lb-cap").textContent = cap;
  document.getElementById("lightbox").classList.add("open");
}
function fecharLb() { document.getElementById("lightbox").classList.remove("open"); }
document.addEventListener("keydown", e => { if(e.key==="Escape") fecharLb(); });

// ── HELPERS ───────────────────────────────────────────────
function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function atualizarHora() {
  const h = new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("hora-texto").textContent = `Atualizado às ${h}`;
}

// Auto-refresh a cada 60s
setInterval(() => { if(autenticado) carregar(); }, 60000);
</script>
</body>
</html>
